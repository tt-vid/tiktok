<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Selfie</title>
<style>
body { margin: 0; background: #000; color: white; font-family: Arial, sans-serif; }
#container { display: flex; justify-content: center; align-items: center; height: 100vh; }
video { width: 300px; height: 400px; object-fit: cover; border-radius: 10px; }
button { position: absolute; bottom: 50px; padding: 15px 30px; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>
<div id="container">
<video id="video" autoplay playsinline></video>
<button id="snap">Take Selfie</button>
</div>

<script>
const video = document.getElementById('video');
const snapBtn = document.getElementById('snap');

// Start camera on first click (browser requirement)
let started = false;
document.body.addEventListener('click', async () => {
if (!started) {
try {
const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
video.srcObject = stream;
started = true;
} catch (err) {
alert("Camera permission denied or not available.");
}
}
});

snapBtn.addEventListener('click', () => {
if (!started) return;

// Create a canvas to capture the frame
const canvas = document.createElement('canvas');
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
const ctx = canvas.getContext('2d');
ctx.drawImage(video, 0, 0);

// Convert to base64 image
const imageData = canvas.toDataURL('image/jpeg');

// Save to LocalStorage (browser memory)
localStorage.setItem('tiktok_selfie', imageData);

// Optional: Show the image
const img = new Image();
img.src = imageData;
document.body.appendChild(img);

alert("Selfie taken! Check browser storage.");
});
</script>
</body>
</html>
